name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Test
        run: |
          echo "Starting build"
          go version
          echo "go.mod contents:"
          cat go.mod
          echo "Files:"
          ls -la
          echo "Building..."
          go build -v ./... 2>&1 | head -20
