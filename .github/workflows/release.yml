name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Get tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Resolve dependencies
        run: go mod tidy

      - name: Build
        run: go build -ldflags="-s -w" -o portkill .

      - name: Test build
        run: ./portkill version

      - name: Create checksums
        run: sha256sum portkill > portkill.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            portkill
            portkill.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
