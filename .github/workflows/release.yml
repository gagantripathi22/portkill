name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Get dependencies
        run: |
          echo "=== go version ==="
          go version
          echo "=== Listing files ==="
          ls -la
          echo "=== go.mod ==="
          cat go.mod
          echo "=== go get ==="
          go get github.com/charmbracelet/bubbletea@v0.25.0 2>&1
          go get github.com/charmbracelet/lipgloss@v0.9.1 2>&1
          go get github.com/spf13/cobra@v1.8.0 2>&1
          echo "=== after go get ==="
          cat go.sum | head -5

      - name: Build
        run: go build -ldflags="-s -w" -o portkill .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: portkill
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
