name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: go build -ldflags="-s -w" -o portkill .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: portkill-binary
          path: portkill

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: portkill
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
