name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Debug
        run: |
          go version
          go env GOPATH GOMODCACHE
          ls -la

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build -v -ldflags="-s -w" -o portkill .
