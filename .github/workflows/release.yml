name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Tidy modules
        run: |
          go mod tidy
          echo "=== go.sum after tidy ==="
          cat go.sum | head -5

      - name: Build
        run: |
          echo "=== Building ==="
          go build -v -o portkill . 2>&1
          echo "=== Build done ==="

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: portkill
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
