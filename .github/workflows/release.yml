name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: |
          echo "=== Building ==="
          go build -v -ldflags="-s -w" -o portkill . 2>&1
          echo "=== Build complete ==="
          ls -la portkill 2>&1 || echo "Build failed - no binary"

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: portkill
          path: portkill
