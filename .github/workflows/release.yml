name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Verify files
        run: |
          echo "=== Files ==="
          ls -la
          echo "=== go.mod ==="
          cat go.mod
          echo "=== go.sum ==="
          head -3 go.sum

      - name: Build
        run: go build -v -o portkill .

      - name: Verify binary
        run: |
          echo "Binary built:"
          ls -la portkill

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: portkill
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
