name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: |
          go build -v -ldflags="-s -w" -o portkill .

      - name: Create checksums
        run: sha256sum portkill > portkill.sha256

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: |
            portkill
            portkill.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
